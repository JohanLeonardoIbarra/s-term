<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            font-size: 18px;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000000; }
        ::-webkit-scrollbar-thumb { background: #333333; }
        .terminal-cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background-color: #00FF41;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        input[type="range"] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type="range"]::-webkit-slider-runnable-track {

            height: 2px;

        }
        input[type="range"]::-webkit-slider-thumb {

<body class="text-on-surface font-body-md text-body-md min-h-screen selection:bg-logic-blue selection:text-white bg-surface-container-lowest">
<!-- Top AppBar Component -->

<!-- Side Navigation Bar Component -->

<!-- Main Content Canvas (Terminal Mockup) -->
<main class="min-h-screen relative flex items-center justify-center overflow-hidden">
<!-- Terminal Background Aesthetic -->

<!-- SETTINGS MODAL -->
<div class="relative z-10 w-full max-w-2xl mx-margin-mobile bg-surface-container border border-border-slate shadow-2xl flex flex-col" id="settings-modal">
<!-- Modal Header -->
<div class="p-margin-desktop border-b border-border-slate flex justify-between items-center bg-surface-container-high">
<div class="flex items-center gap-stack-default">
<span class="material-symbols-outlined text-primary">settings</span>
<h1 class="font-label-caps text-label-caps text-primary tracking-widest">SETTINGS_CONFIG</h1>
</div>
<button class="material-symbols-outlined text-on-surface-variant hover:text-primary transition-colors">close</button>
</div>
<!-- Modal Body -->
<div class="p-margin-desktop space-y-8 max-h-[70vh] overflow-y-auto">
<!-- Section: THEME_PREFERENCE -->
<section class="space-y-stack-default">
<label class="font-label-caps text-label-caps text-on-surface-variant opacity-60">THEME_PREFERENCE</label>
<div class="grid grid-cols-2 border border-border-slate p-1 gap-1">
<button class="py-2 bg-surface-active text-primary border border-logic-blue font-code-md text-code-md flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-sm">dark_mode</span>
                            OSCURO
                        </button>
<button class="py-2 hover:bg-surface-container-highest text-on-surface-variant font-code-md text-code-md flex items-center justify-center gap-2 transition-colors">
<span class="material-symbols-outlined text-sm">light_mode</span>
                            CLARO
                        </button>
</div>
</section>
<!-- Section: LOCALIZATION -->
<section class="space-y-stack-default">
<label class="font-label-caps text-label-caps text-on-surface-variant opacity-60">LOCALIZATION</label>
<div class="relative group">
<select class="w-full bg-surface-base border-b border-border-slate text-on-surface font-code-md text-code-md py-3 px-2 appearance-none focus:outline-none focus:border-primary cursor-pointer transition-colors">
<option value="en">English (US)</option>
<option selected="" value="es">Español (ES)</option>
<option value="de">Deutsch (DE)</option>
<option value="jp">日本語 (JP)</option>
</select>
<span class="material-symbols-outlined absolute right-2 top-3 pointer-events-none text-on-surface-variant">expand_more</span>
</div>
</section>
<!-- Dual Font Sliders -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<!-- Section: UI_FONT_SIZE -->
<section class="space-y-stack-default">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-on-surface-variant opacity-60">UI_FONT_SIZE</label>
<span class="font-code-sm text-code-sm text-primary">14px</span>
</div>
<div class="flex items-center gap-stack-default py-2">
<span class="font-body-sm text-body-sm text-on-surface-variant">A</span>

</div>

<span class="material-symbols-outlined">remove</span>
</button>
<div class="flex-1 text-center font-code-md text-code-md py-2">12px</div>
<button class="p-2 px-4 hover:bg-surface-active text-primary transition-colors border-l border-border-slate">
<span class="material-symbols-outlined">add</span>
</button>

</section>

                    DISCARD
                </button>
<button class="px-6 py-2 bg-primary text-surface-base font-label-caps text-label-caps font-bold hover:bg-on-surface-variant transition-all order-1 md:order-2">
                    SAVE_CHANGES
                </button>
</div>
</div>
<!-- Decorative Elements -->

</main>
<script>
        // Simple micro-interaction for the close/discard actions
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function() {
                if(this.innerText.includes('DISCARD') || this.innerText.includes('close')) {
                    const modal = document.getElementById('settings-modal');
                    modal.style.opacity = '0.5';
                    modal.style.filter = 'grayscale(1)';
                    setTimeout(() => {
                        modal.style.opacity = '1';
                        modal.style.filter = 'none';
                    }, 300);
                }
            });
        });
    </script>
